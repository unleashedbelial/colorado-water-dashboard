name: Update Reservoir Data

on:
  schedule:
    # Run every 12 hours (06:00 and 18:00 UTC)
    - cron: '0 6,18 * * *'
  workflow_dispatch: # also allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch reservoir data
        run: python3 update-reservoirs.py

      - name: Commit & push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/unleashedbelial/colorado-water-dashboard.git
          git add reservoir-data.json
          git diff --staged --quiet || git commit -m "chore: update reservoir data $(date -u +%Y-%m-%d)"
          git push
